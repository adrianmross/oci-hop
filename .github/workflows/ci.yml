name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Install released oci-context
        run: |
          curl -fsSL https://raw.githubusercontent.com/adrianmross/oci-context/main/install.sh -o /tmp/install-oci-context.sh
          PREFIX="$RUNNER_TEMP/oci-tools" VERSION=latest bash /tmp/install-oci-context.sh

      - name: Install released bastion-session
        run: |
          curl -fsSL https://raw.githubusercontent.com/adrianmross/bastion-session/main/install.sh -o /tmp/install-bastion-session.sh
          PREFIX="$RUNNER_TEMP/oci-tools" VERSION=latest bash /tmp/install-bastion-session.sh

      - name: Real binary E2E
        env:
          OCI_CONTEXT_BIN: ${{ runner.temp }}/oci-tools/bin/oci-context
          BASTION_SESSION_BIN: ${{ runner.temp }}/oci-tools/bin/bastion-session
        run: go test -tags=e2e ./...
