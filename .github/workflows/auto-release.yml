name: Auto Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  actions: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine next semver tag from commits
        id: semver
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n1 || true)"
          if [[ -z "$latest_tag" ]]; then latest_tag="v0.0.0"; fi
          commits="$(git log --format=%s "${latest_tag}..HEAD")"
          if [[ -z "$commits" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version="${latest_tag#v}"
          IFS=. read -r major minor patch <<< "$version"
          bump="patch"
          if echo "$commits" | grep -Eq '(^| )feat(!|\(|:)|BREAKING CHANGE'; then bump="minor"; fi
          if echo "$commits" | grep -Eq 'BREAKING CHANGE|!:'; then bump="major"; fi
          case "$bump" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.semver.outputs.should_release == 'true'
        run: |
          tag="${{ steps.semver.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Release handoff
        if: steps.semver.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml -f tag="${{ steps.semver.outputs.new_tag }}"
